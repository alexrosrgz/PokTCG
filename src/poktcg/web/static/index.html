<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokTCG Deck Optimizer</title>
<style>
  :root {
    --bg: #1a1a2e; --surface: #16213e; --card: #0f3460;
    --accent: #e94560; --text: #eee; --muted: #999;
    --green: #4ecca3; --red: #e94560; --yellow: #f0c929;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  h1 { margin: 0; font-size: 2.2em; text-shadow: 0 0 15px rgba(233,69,96,0.3); }
  h1 span { color: var(--accent); }
  .subtitle { text-align: left; color: var(--muted); margin-bottom: 30px; font-size: 0.95em; margin-top: -10px; }
  h2 { margin: 20px 0 12px; font-size: 1.2em; border-bottom: 2px solid var(--accent); padding-bottom: 4px; display: inline-block; }

  /* Config Form */
  .config { background: var(--surface); padding: 24px; border-radius: 10px; margin-bottom: 24px; }
  .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .chip-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip { cursor: pointer; }
  .chip input { display: none; }
  .chip span { display: inline-block; padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: var(--muted); transition: all 0.2s; font-size: 0.9em; font-weight: 600; }
  .chip:hover span { border-color: rgba(255,255,255,0.3); color: #fff; background: rgba(255,255,255,0.05); }
  .chip input:checked + span { background: rgba(233, 69, 96, 0.15); border-color: var(--accent); color: #fff; box-shadow: 0 0 12px rgba(233,69,96,0.3); }
  
  select { background: rgba(0,0,0,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 14px; border-radius: 8px; font-size: 0.95em; width: 100%; cursor:pointer; outline: none; transition: border-color 0.2s; }
  select:focus, select:hover { border-color: var(--accent); }
  .counter-targets { margin-top: 12px; display: none; }
  .counter-targets.visible { display: block; }
  button.run { background: linear-gradient(135deg, var(--accent) 0%, #b82d45 100%); color: #fff; border: none; padding: 14px 44px; border-radius: 8px; font-size: 1.1em; cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4); text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
  button.run:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(233, 69, 96, 0.6); }
  button.run:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Progress */
  .progress-area { background: var(--surface); padding: 20px; border-radius: 10px; margin-bottom: 24px; display: none; }
  .progress-area.visible { display: block; }
  .progress-bar-wrap { background: var(--card); border-radius: 6px; height: 28px; overflow: hidden; margin-bottom: 12px; position: relative; }
  .progress-bar { background: linear-gradient(90deg, var(--accent), var(--yellow)); height: 100%; width: 0%; transition: width 0.3s; border-radius: 6px; }
  .progress-bar-text { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 0.85em; font-weight: 600; }
  .log { max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.85em; background: var(--bg); padding: 10px; border-radius: 6px; }
  .log .status { color: var(--yellow); }
  .log .gen { color: var(--green); }
  .log .hof { color: var(--accent); }

  /* Results */
  .results-area { display: none; }
  .results-area.visible { display: block; }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 768px) { .config-grid, .results-grid { grid-template-columns: 1fr; } }

  /* Deck display */
  .deck-panel { background: var(--surface); padding: 18px; border-radius: 10px; }
  .deck-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .deck-header .fitness { font-size: 1.3em; font-weight: 700; color: var(--green); }
  .deck-header .counts { font-size: 0.85em; color: var(--muted); }
  .card-section { margin-bottom: 16px; }
  .card-section h3 { font-size: 0.85em; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .card-grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .card-thumb { position: relative; width: 100px; text-align: center; }
  .card-thumb img { width: 100px; border-radius: 6px; display: block; background: var(--card); min-height: 140px; }
  .card-thumb .count-badge { position: absolute; top: 4px; left: 4px; background: var(--accent); color: #fff; font-size: 0.75em; font-weight: 700; padding: 2px 6px; border-radius: 8px; line-height: 1; }
  .card-thumb .thumb-name { font-size: 0.75em; margin-top: 4px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-thumb .thumb-meta { font-size: 0.65em; color: var(--muted); line-height: 1.2; }

  /* Tabs for top decks */
  .deck-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .deck-tabs button { background: var(--card); color: var(--muted); border: none; padding: 6px 16px; border-radius: 6px 6px 0 0; cursor: pointer; font-weight: 600; }
  .deck-tabs button.active { background: var(--accent); color: #fff; }

  /* Matchup table */
  .matchup-panel { background: var(--surface); padding: 18px; border-radius: 10px; }
  table.matchup { width: 100%; border-collapse: collapse; font-size: 0.9em; }
  table.matchup th, table.matchup td { padding: 8px 12px; text-align: center; }
  table.matchup th { color: var(--muted); font-size: 0.85em; text-transform: uppercase; }
  table.matchup td { border-top: 1px solid rgba(255,255,255,0.05); font-weight: 600; }

  /* Chart */
  .chart-panel { background: var(--surface); padding: 18px; border-radius: 10px; }
  canvas { width: 100%; height: 250px; display: block; }

  /* Card frequency */
  .freq-panel { background: var(--surface); padding: 18px; border-radius: 10px; }
  .freq-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .freq-tag { background: var(--card); padding: 4px 12px; border-radius: 16px; font-size: 0.85em; }
  .freq-tag.pokemon { border-left: 3px solid var(--accent); }
  .freq-tag.trainer { border-left: 3px solid var(--yellow); }
  .freq-tag.energy { border-left: 3px solid var(--green); }

  .full-width { grid-column: 1 / -1; }

  /* Insights panel */
  .insights-panel { background: var(--surface); padding: 18px; border-radius: 10px; }
  .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 16px; }
  .insight-stat { background: var(--card); padding: 12px; border-radius: 8px; text-align: center; }
  .insight-stat .stat-value { font-size: 1.4em; font-weight: 700; color: var(--green); }
  .insight-stat .stat-label { font-size: 0.75em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .win-conditions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .win-cond { background: var(--card); padding: 8px 14px; border-radius: 8px; font-size: 0.85em; display: flex; align-items: center; gap: 8px; }
  .win-cond .cond-bar { height: 6px; border-radius: 3px; min-width: 30px; }
  .win-cond .cond-pct { font-weight: 700; min-width: 40px; text-align: right; }

  /* Modal Zoom */
  .image-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); z-index: 1000; align-items: center; justify-content: center; cursor: zoom-out; backdrop-filter: blur(0px); transition: background 0.25s ease, backdrop-filter 0.25s ease; }
  .image-modal.active { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
  .image-modal img { position: absolute; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0); transition: all 0.25s ease-out; object-fit: contain; }
  .image-modal.active img { box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 16px; }

  /* Saved Decks */
  .saved-decks { background: var(--surface); padding: 24px; border-radius: 10px; margin-bottom: 24px; display: none; }
  .saved-decks.visible { display: block; }
  .save-btn { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .save-btn:hover { opacity: 0.8; }
  .save-form { display: none; gap: 8px; align-items: center; }
  .save-form.active { display: flex; }
  .save-form input { background: var(--bg); color: var(--text); border: 1px solid #333; padding: 6px 12px; border-radius: 6px; font-size: 0.9em; outline: none; }
  .delete-btn { color: var(--muted); background: none; border: none; cursor: pointer; opacity: 0.3; transition: all 0.2s; font-size: 0.85em; font-weight: bold; margin-left: 12px; padding: 4px 8px; border-radius: 4px; }
  .delete-btn:hover { color: var(--red); opacity: 1; background: rgba(233,69,96,0.1); }

  /* Deck Builder */
  .top-nav { display: flex; gap: 12px; }
  .nav-btn { background: var(--surface); color: var(--muted); border: none; padding: 8px 24px; font-size: 1em; cursor: pointer; border-radius: 8px; font-weight: bold; transition: all 0.2s;}
  .nav-btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4); }
  .nav-btn:hover:not(.active) { background: #2a3a5a; color: #fff; }
  
  .builder-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
  @media (max-width: 768px) { .builder-grid { grid-template-columns: 1fr; } }
  .builder-panel { background: var(--surface); padding: 18px; border-radius: 10px; }
  .library-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-height: 60vh; overflow-y: auto; padding-right: 10px; }
  .library-card { cursor: pointer; position: relative; text-align: center; }
  .library-card img { width: 100%; border-radius: 6px; }
  .library-card:hover { transform: scale(1.05); }
  .search-input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid #333; background: var(--bg); color: #fff; margin-bottom: 16px; font-size: 1em; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .builder-deck-list { max-height: 55vh; overflow-y: auto; margin-bottom: 16px;}
  .builder-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); align-items:center; }
  .b-ctrl button { background: var(--card); color: #fff; border:none; width:26px; height:26px; border-radius:4px; cursor: pointer; font-weight:bold;}
  .b-ctrl button:hover { background: var(--accent); }
  .b-name { font-size: 0.85em; flex: 1; margin: 0 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: zoom-in; }
  .b-name:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header style="display:flex; justify-content:space-between; align-items:center; padding-bottom: 20px; border-bottom: 2px solid rgba(255, 255, 255, 0.15); margin-bottom: 24px; flex-wrap:wrap; gap:16px;">
    <h1>Pok<span>TCG</span></h1>
    <div class="top-nav">
      <button class="nav-btn active" id="navOpt" onclick="switchMode('optimizer')">Optimizer</button>
      <button class="nav-btn" id="navBuild" onclick="switchMode('builder')">Deck Builder</button>
      <button class="nav-btn" id="navSaved" onclick="switchMode('saved')">Saved Decks</button>
    </div>
  </header>
  <div id="optimizerView">

  <!-- Config -->
  <div class="config">
    <h2 style="margin:0; font-size:1.4em; margin-bottom: 24px;">Genetic Optimization Engine</h2>
    <div style="display: flex; flex-direction: column; gap: 24px;">
      
      <!-- Row 1 -->
      <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        
        <div class="form-group" style="flex: 1; min-width: 300px; margin: 0;">
          <label>Starting Archetypes</label>
          <div style="display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap;">
            <div class="chip-group">
              <label class="chip"><input type="checkbox" value="haymaker" checked> <span>Haymaker</span></label>
              <label class="chip"><input type="checkbox" value="raindance" checked> <span>Raindance</span></label>
              <label class="chip"><input type="checkbox" value="damage_swap" checked> <span>Damage Swap</span></label>
            </div>
            <select id="customArchetypeSelect" style="flex: 1; min-width: 160px; max-width: 200px; padding: 6px 10px;">
              <option value="">-- Add Saved Deck --</option>
            </select>
          </div>
        </div>
        
        <div style="flex: 1; display:flex; gap: 20px; min-width: 300px;">
          <div class="form-group" style="flex:1; margin: 0;">
            <label>Search Depth</label>
            <select id="depth">
              <option value="quick">Quick (~1 min)</option>
              <option value="normal" selected>Normal (~3 min)</option>
              <option value="deep">Deep (~8 min)</option>
            </select>
          </div>
          <div class="form-group" style="flex:1; margin: 0;">
            <label>Card Pool</label>
            <select id="cardPool">
              <option value="base">Base Set only</option>
              <option value="base_jungle">Base + Jungle</option>
              <option value="base_jungle_fossil">Base + Jungle + Fossil</option>
              <option value="all" selected>All (+ Promos)</option>
            </select>
          </div>
        </div>

      </div>

      <!-- Row 2 -->
      <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div class="form-group" style="flex: 1; min-width: 300px; margin: 0;">
          <label>Optimize For</label>
          <div class="chip-group" style="margin-bottom: 12px;">
            <label class="chip"><input type="radio" name="mode" value="coevolution" checked> <span>Best overall deck</span></label>
            <label class="chip"><input type="radio" name="mode" value="counter"> <span>Best counter to...</span></label>
          </div>
          <!-- Counter Targets conditionally drop down here -->
          <div class="counter-targets" id="counterTargets" style="margin-top: 0;">
            <div class="chip-group">
              <label class="chip"><input type="checkbox" class="counter-cb" value="haymaker" checked> <span>Haymaker</span></label>
              <label class="chip"><input type="checkbox" class="counter-cb" value="raindance"> <span>Raindance</span></label>
              <label class="chip"><input type="checkbox" class="counter-cb" value="damage_swap"> <span>Damage Swap</span></label>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Action Footer -->
      <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 24px; margin-top: 8px; display: flex; justify-content: flex-end;">
        <button class="run" id="runBtn" onclick="startOptimization()" style="margin: 0; min-width: 250px;">Run Optimizer</button>
      </div>

    </div>
  </div>

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <h2>Progress</h2>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
      <div class="progress-bar-text" id="progressText">0%</div>
    </div>
    <div class="log" id="log"></div>
  </div>

  <!-- Results -->
  <div class="results-area" id="resultsArea">
    <div class="results-grid">
      <div class="deck-panel full-width">
        <h2>Top Decks</h2>
        <div class="deck-tabs" id="deckTabs"></div>
        <div id="deckDisplay"></div>
      </div>

      <div class="insights-panel full-width">
        <h2>Simulation Insights</h2>
        <div class="insights-grid" id="insightsGrid"></div>
        <div class="win-conditions" id="winConditions"></div>
      </div>

      <div class="matchup-panel">
        <h2>Matchups vs Archetypes</h2>
        <div id="matchupTable"></div>
      </div>

      <div class="freq-panel">
        <h2>Common Cards (Top 3)</h2>
        <div class="freq-list" id="freqList"></div>
      </div>

      <div class="chart-panel full-width">
        <h2>Fitness Over Generations</h2>
        <canvas id="fitnessChart" height="250"></canvas>
      </div>
    </div>
  </div>
  </div> <!-- end optimizerView-->

  <!-- Saved Decks View -->
  <div id="savedDecksPanel" style="display:none; padding:0;">
    <div class="deck-tabs" id="savedDeckTabs" style="margin-bottom: 20px; display:flex; flex-wrap:wrap;"></div>
    <div class="deck-panel" id="savedDeckDisplay" style="display:none; padding:0; background:none;"></div>
  </div>

  <!-- Builder View -->
  <div id="builderView" style="display:none;">
    <div class="builder-grid">
      <div class="builder-panel">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 12px;">
          <h2 style="margin:0; font-size:1.4em;">Card Library</h2>
          <div id="libraryCount" style="font-size:0.85em; color:var(--muted); font-weight:bold;">0 Cards Available</div>
        </div>
        <div style="display:flex; gap: 8px; margin-bottom: 16px; flex-wrap:wrap;">
          <input type="text" id="libSearch" class="search-input" style="margin-bottom:0; flex: 2; min-width:140px;" placeholder="Search by name..." oninput="renderLibrary()">
          <select id="libFilter" onchange="renderLibrary()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #333; background:var(--bg); color:#fff; outline:none; cursor:pointer;">
            <option value="all">Filter...</option>
            <optgroup label="Supertype">
              <option value="super:Pokémon">&nbsp;&nbsp;Pokémon</option>
              <option value="super:Trainer">&nbsp;&nbsp;Trainer</option>
              <option value="super:Energy">&nbsp;&nbsp;Energy</option>
            </optgroup>
            <optgroup label="Subtype">
              <option value="sub:Basic">&nbsp;&nbsp;Basic Pokémon / Energy</option>
              <option value="sub:Stage 1">&nbsp;&nbsp;Stage 1</option>
              <option value="sub:Stage 2">&nbsp;&nbsp;Stage 2</option>
              <option value="sub:Special">&nbsp;&nbsp;Special Energy</option>
            </optgroup>
          </select>
          <select id="libSort" onchange="renderLibrary()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #333; background:var(--bg); color:#fff; outline:none; cursor:pointer;">
            <option style="display:none;" value="default">Sort...</option>
            <option value="nameAsc">Name (A-Z)</option>
            <option value="hpDesc">Highest HP</option>
          </select>
        </div>
        <div class="library-grid" id="libraryGrid"><div style="color:var(--muted)">Loading library...</div></div>
      </div>
      <div class="builder-panel" style="display:flex; flex-direction:column;">
        <h2 style="margin-top:0">Your Deck</h2>
        <div style="font-size: 0.8em; color:var(--muted); margin-bottom:8px;" id="builderCounts">0 / 60 Cards</div>
        <div class="builder-deck-list" id="builderDeckList"></div>
        
        <div style="margin-top:auto; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
          <input type="text" id="builderDeckName" class="search-input" style="margin-bottom:10px" placeholder="Deck Name...">
          <button class="run" style="width:100%; margin:0" onclick="saveCustomDeck()">Save Deck</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Zoom Modal -->
<div class="image-modal" id="imageModal" onclick="closeModal()">
  <img id="modalImg" src="" alt="Enlarged Card" onerror="if(this.src.includes('_hires')) this.src=this.src.replace('_hires.png', '.png');">
</div>

<script>
// Toggle counter targets visibility
document.querySelectorAll('input[name="mode"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('counterTargets').classList.toggle('visible', r.value === 'counter' && r.checked);
  });
});

let currentResults = null;

async function startOptimization() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';

  const progressArea = document.getElementById('progressArea');
  const resultsArea = document.getElementById('resultsArea');
  progressArea.classList.add('visible');
  resultsArea.classList.remove('visible');

  const log = document.getElementById('log');
  log.innerHTML = '';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = '0%';

  const archetypes = [...document.querySelectorAll('.chip-group input[type="checkbox"]:not(.counter-cb):checked')]
    .map(cb => cb.value);
  const customArch = document.getElementById('customArchetypeSelect')?.value;
  if (customArch) {
    archetypes.push(customArch);
  }
  const mode = document.querySelector('input[name="mode"]:checked').value;
  const counterTargets = mode === 'counter'
    ? [...document.querySelectorAll('.counter-cb:checked')].map(cb => cb.value)
    : [];
  const depth = document.getElementById('depth').value;
  const cardPool = document.getElementById('cardPool').value;

  const body = JSON.stringify({ archetypes, mode, counter_targets: counterTargets, depth, card_pool: cardPool });

  try {
    const response = await fetch('/api/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          const data = JSON.parse(line.slice(6));
          handleEvent(eventType, data);
          eventType = null;
        }
      }
    }
  } catch (e) {
    addLog('error', 'Connection error: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Run Optimizer';
}

function handleEvent(type, data) {
  if (type === 'generation') {
    const pct = Math.round((data.gen / data.total) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Gen ${data.gen}/${data.total} (${pct}%)`;
    addLog('gen', `Gen ${data.gen}/${data.total}: best=${data.best_fitness.toFixed(3)} avg=${data.avg_fitness.toFixed(3)}`);
  } else if (type === 'hof') {
    addLog('hof', data.message);
  } else if (type === 'status') {
    addLog('status', data.message);
  } else if (type === 'complete') {
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('progressText').textContent = 'Complete!';
    addLog('status', 'Optimization complete!');
    currentResults = data;
    showResults(data);
  } else if (type === 'error') {
    addLog('status', 'Error: ' + data.message);
  }
}

function addLog(cls, text) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

let activeThumbnail = null;

// Allow closing with Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('imageModal').classList.contains('active')) {
    closeModal();
  }
});

function zoomCard(evt, url, imgElem) {
  evt.stopPropagation();
  activeThumbnail = imgElem;
  const modal = document.getElementById('imageModal');
  const modalImg = document.getElementById('modalImg');
  
  const hiresUrl = url.replace('.png', '_hires.png');
  modalImg.src = hiresUrl;
  
  const rect = imgElem.getBoundingClientRect();
  
  // Start exactly where the thumbnail is
  modalImg.style.top = rect.top + 'px';
  modalImg.style.left = rect.left + 'px';
  modalImg.style.width = rect.width + 'px';
  modalImg.style.height = rect.height + 'px';
  modalImg.style.transform = 'rotateY(-360deg)';
  
  modal.style.display = 'block';
  
  // Force browser reflow to apply starting styles without animation
  void modalImg.offsetWidth; 
  
  // Transition to fullscreen center
  modal.classList.add('active');
  document.body.style.overflow = 'hidden'; // Lock background scrolling
  modalImg.style.transform = 'rotateY(0deg)';
  
  // Calculate exact target dimensions preserving aspect ratio to prevent squishing
  const cardAspect = rect.width / rect.height;
  const maxWidth = window.innerWidth * 0.9;
  const maxHeight = window.innerHeight * 0.9;
  
  let targetWidth = maxWidth;
  let targetHeight = targetWidth / cardAspect;
  
  if (targetHeight > maxHeight) {
    targetHeight = maxHeight;
    targetWidth = targetHeight * cardAspect;
  }
  
  modalImg.style.top = ((window.innerHeight - targetHeight) / 2) + 'px';
  modalImg.style.left = ((window.innerWidth - targetWidth) / 2) + 'px';
  modalImg.style.width = targetWidth + 'px';
  modalImg.style.height = targetHeight + 'px';
}

function closeModal() {
  const modal = document.getElementById('imageModal');
  const modalImg = document.getElementById('modalImg');
  
  if (!activeThumbnail) {
    modal.style.display = 'none';
    modal.classList.remove('active');
    return;
  }
  
  const rect = activeThumbnail.getBoundingClientRect();
  modal.classList.remove('active');
  
  // Animate back to original thumbnail spot
  modalImg.style.top = rect.top + 'px';
  modalImg.style.left = rect.left + 'px';
  modalImg.style.width = rect.width + 'px';
  modalImg.style.height = rect.height + 'px';
  modalImg.style.transform = 'rotateY(-360deg)';
  
  // Hide modal completely after transition ends
  setTimeout(() => {
    modal.style.display = 'none';
    modalImg.style.transform = 'none';
    document.body.style.overflow = ''; // Unlock scrolling
  }, 250);
}

function showResults(data) {

  const tabs = document.getElementById('deckTabs');
  tabs.innerHTML = '';
  data.decks.forEach((deck, i) => {

    btn.textContent = `#${i + 1} (${(deck.fitness * 100).toFixed(1)}%)`;

function cardImgUrl(card) {
  const [set, num] = card.id.split('-');
  return `https://images.pokemontcg.io/${set}/${num}.png`;
}

let currentDecksToSave = {};

function renderDeck(deck, index, elId = 'deckDisplay', savedDeckName = null) {
  const el = document.getElementById(elId);
  currentDecksToSave[index] = deck;
  
  const pokemon = deck.cards.filter(c => c.supertype === 'Pokémon').sort((a, b) => a.name.localeCompare(b.name));
  const trainers = deck.cards.filter(c => c.supertype === 'Trainer').sort((a, b) => a.name.localeCompare(b.name));
  const energy = deck.cards.filter(c => c.supertype === 'Energy').sort((a, b) => a.name.localeCompare(b.name));

  const winRateText = deck.fitness ? (deck.fitness * 100).toFixed(1) + '% win rate' : 'Saved Deck';

  let html = `<div class="deck-header" style="align-items:flex-start;">
    <div>
      <div class="fitness">${winRateText} 
        ${savedDeckName ? `<button class="delete-btn" style="color:var(--yellow); opacity:0.8" onclick="editSavedDeck('${savedDeckName.replace(/'/g, "\\'")}')">✎ Edit</button> <button class="delete-btn" onclick="deleteSavedDeck('${savedDeckName.replace(/'/g, "\\'")}')" title="Delete Deck">✕ Delete</button>` : ''}
      </div>
      <div class="counts">${deck.total_cards} cards: ${deck.pokemon_count}P / ${deck.trainer_count}T / ${deck.energy_count}E</div>
    </div>`;

  if (!savedDeckName) {
    html += `
    <div style="margin-left:auto;">
      <button class="save-btn" id="saveBtn-${index}" onclick="document.getElementById('saveBtn-${index}').style.display='none'; document.getElementById('saveForm-${index}').classList.add('active');">Save Deck</button>
      <div class="save-form" id="saveForm-${index}">
        <input type="text" id="deckNameIn-${index}" placeholder="Deck Name...">
        <button class="save-btn" onclick="submitSaveDeck(${index})">Confirm</button>
      </div>
    </div>`;
  }
  
  html += `</div>`;

  html += renderCardSection('Pokemon', pokemon, c => {
    const meta = [];
    if (c.hp) meta.push(c.hp + 'HP');
    if (c.types && c.types.length) meta.push(c.types.join('/'));
    return meta.join(' · ');
  });

  html += renderCardSection('Trainers', trainers, () => '');
  html += renderCardSection('Energy', energy, () => '');

  el.innerHTML = html;
}

function renderCardSection(title, cards, metaFn) {
  if (!cards.length) return '';
  let html = `<div class="card-section"><h3>${title}</h3><div class="card-grid">`;
  for (const c of cards) {
    const meta = metaFn(c);
    const imgUrl = cardImgUrl(c);
    html += `<div class="card-thumb">
      <img src="${imgUrl}" alt="${c.name}" loading="lazy" style="cursor: zoom-in; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick="zoomCard(event, '${imgUrl}', this)" onerror="this.style.background='var(--card)';this.style.minHeight='140px';this.removeAttribute('src')">
      <span class="count-badge">${c.count}x</span>
      <div class="thumb-name" title="${c.name}">${c.name}</div>
      ${meta ? `<div class="thumb-meta">${meta}</div>` : ''}
    </div>`;
  }
  html += '</div></div>';
  return html;
}

function renderInsights(insights, fitnessHistory) {
  const grid = document.getElementById('insightsGrid');
  const condEl = document.getElementById('winConditions');
  if (!insights) { grid.innerHTML = ''; condEl.innerHTML = ''; return; }

  // Format time
  const mins = Math.floor(insights.total_time_sec / 60);
  const secs = Math.round(insights.total_time_sec % 60);
  const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;

  // Stat cards
  const stats = [
    { value: insights.total_games.toLocaleString(), label: 'Games Played' },
    { value: insights.games_per_sec.toLocaleString(), label: 'Games / Second' },
    { value: timeStr, label: 'Total Time' },
    { value: insights.avg_turns_per_game, label: 'Avg Turns / Game' },
  ];

  grid.innerHTML = stats.map(s =>
    `<div class="insight-stat"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`
  ).join('');

  // Win conditions breakdown
  const conds = insights.win_conditions;
  const total = Object.values(conds).reduce((a, b) => a + b, 0);
  if (!total) { condEl.innerHTML = ''; return; }

  const condColors = {
    'all prizes taken': 'var(--green)',
    'no Pokémon remaining': 'var(--accent)',
    'deck out': 'var(--yellow)',
    'max turns reached': 'var(--muted)',
  };
  const condLabels = {
    'all prizes taken': 'Prizes Taken',
    'no Pokémon remaining': 'No Pokemon Left',
    'deck out': 'Deck Out',
    'max turns reached': 'Max Turns',
  };

  const sorted = Object.entries(conds).sort((a, b) => b[1] - a[1]);
  condEl.innerHTML = sorted.map(([reason, count]) => {
    const pct = (count / total * 100).toFixed(1);
    const color = condColors[reason] || 'var(--muted)';
    const label = condLabels[reason] || reason;
    const barWidth = Math.max(30, count / total * 120);
    return `<div class="win-cond">
      <span class="cond-pct">${pct}%</span>
      <span class="cond-bar" style="background:${color};width:${barWidth}px"></span>
      <span>${label}</span>
    </div>`;
  }).join('');
}

function renderMatchups(matchups) {
  const el = document.getElementById('matchupTable');
  const entries = Object.entries(matchups);
  if (!entries.length) {
    el.innerHTML = '<p style="color:var(--muted)">No archetype matchups (no seed decks selected)</p>';
    return;
  }

  let html = '<table class="matchup"><tr><th>Archetype</th><th>Win Rate</th></tr>';
  for (const [name, wr] of entries) {
    const pct = (wr * 100).toFixed(1);
    const color = wr > 0.55 ? 'var(--green)' : wr < 0.45 ? 'var(--red)' : 'var(--yellow)';
    html += `<tr><td>${name}</td><td style="color:${color}">${pct}%</td></tr>`;
  }
  html += '</table>';
  el.innerHTML = html;
}

function renderFrequency(commonCards) {
  const el = document.getElementById('freqList');
  if (!commonCards || !commonCards.length) {
    el.innerHTML = '<span style="color:var(--muted)">No cards shared across all top decks</span>';
    return;
  }

  el.innerHTML = commonCards.map(c => {
    const cls = c.supertype === 'Pokémon' ? 'pokemon' : c.supertype === 'Trainer' ? 'trainer' : 'energy';
    return `<span class="freq-tag ${cls}">${c.name}</span>`;
  }).join('');
}

function renderChart(history) {
  const canvas = document.getElementById('fitnessChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 250 * dpr;
  ctx.scale(dpr, dpr);

  const W = rect.width;
  const H = 250;
  const pad = { top: 20, right: 20, bottom: 35, left: 50 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  if (!history || !history.length) return;

  const gens = history.map(h => h.gen);
  const bestVals = history.map(h => h.best_fitness);
  const avgVals = history.map(h => h.avg_fitness);
  const allVals = [...bestVals, ...avgVals];
  const minY = Math.max(0, Math.min(...allVals) - 0.05);
  const maxY = Math.min(1, Math.max(...allVals) + 0.05);
  const minX = Math.min(...gens);
  const maxX = Math.max(...gens);

  const toX = g => pad.left + ((g - minX) / Math.max(1, maxX - minX)) * plotW;
  const toY = v => pad.top + (1 - (v - minY) / Math.max(0.01, maxY - minY)) * plotH;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * plotH;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }

  // Axes labels
  ctx.fillStyle = '#999';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 4; i++) {
    const val = maxY - (i / 4) * (maxY - minY);
    ctx.fillText((val * 100).toFixed(0) + '%', pad.left - 25, pad.top + (i / 4) * plotH + 4);
  }
  // X axis
  const step = Math.max(1, Math.floor(gens.length / 6));
  for (let i = 0; i < gens.length; i += step) {
    ctx.fillText(gens[i], toX(gens[i]), H - 8);
  }
  ctx.fillText('Generation', W / 2, H - 0);

  // Draw lines
  function drawLine(vals, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < gens.length; i++) {
      const x = toX(gens[i]);
      const y = toY(vals[i]);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  drawLine(avgVals, 'rgba(240, 201, 41, 0.7)');
  drawLine(bestVals, '#4ecca3');

  // Legend
  ctx.font = '12px system-ui';
  ctx.fillStyle = '#4ecca3';
  ctx.fillText('Best', W - pad.right - 60, pad.top + 12);
  ctx.fillStyle = 'rgba(240, 201, 41, 0.9)';
  ctx.fillText('Avg', W - pad.right - 20, pad.top + 12);
}

// Saved Decks Logic
let loadedSavedDecksData = {};

async function loadSavedDecks() {
  try {
    const res = await fetch('/api/saved_decks');
    loadedSavedDecksData = await res.json();
    const keys = Object.keys(loadedSavedDecksData);
    const panel = document.getElementById('savedDecksPanel');
    const disp = document.getElementById('savedDeckDisplay');
    
    const customSelect = document.getElementById('customArchetypeSelect');
    if (customSelect) {
      customSelect.innerHTML = '<option value="">-- Add Saved Deck --</option>';
      if (keys.length) {
        keys.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          customSelect.appendChild(opt);
        });
      }
    }

    if (!keys.length) {
      panel.classList.remove('visible');
      return;
    }
    
    panel.classList.add('visible');
    const tabs = document.getElementById('savedDeckTabs');
    tabs.innerHTML = '';
    
    keys.forEach((name, i) => {
      const btn = document.createElement('button');
      btn.textContent = name;
      btn.className = i === 0 ? 'active' : '';
      btn.onclick = () => {
        tabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        disp.style.display = 'block';
        renderDeck(loadedSavedDecksData[name], 1000 + i, 'savedDeckDisplay', name);
      };
      tabs.appendChild(btn);
    });
    
    if (keys.length > 0) {
      disp.style.display = 'block';
      renderDeck(loadedSavedDecksData[keys[0]], 1000, 'savedDeckDisplay', keys[0]);
    } else {
      disp.style.display = 'none';
      disp.innerHTML = '';
    }
  } catch (e) { console.error('Failed to load decks', e); }
}

async function submitSaveDeck(index) {
  const name = document.getElementById(`deckNameIn-${index}`).value.trim();
  if (!name) return alert('Please enter a deck name!');
  try {
    await fetch('/api/saved_decks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, deck: currentDecksToSave[index] })
    });
    const btn = document.querySelector(`#saveForm-${index} button`);
    btn.textContent = 'Saved!';
    btn.style.background = 'var(--green)';
    
    setTimeout(() => { 
      loadSavedDecks();
      switchMode('saved');
      setTimeout(() => {
        const tabs = document.getElementById('savedDeckTabs').querySelectorAll('button');
        const targetTab = Array.from(tabs).find(b => b.textContent === name);
        if (targetTab) targetTab.click();
      }, 100);
    }, 400);
  } catch (e) { alert('Failed to save deck'); }
}

async function deleteSavedDeck(name) {
  if (!confirm(`Are you sure you want to permanently delete the deck "${name}"?`)) return;
  try {
    await fetch(`/api/saved_decks/${encodeURIComponent(name)}`, { method: 'DELETE' });
    loadSavedDecks();
  } catch (e) { alert('Delete failed'); }
}

function editSavedDeck(name) {
  const deck = loadedSavedDecksData[name];
  if (!deck) return;
  
  customDeckCounts = {};
  totalCardsInDeck = 0;
  
  if (deck.cards) {
    deck.cards.forEach(c => {
      customDeckCounts[c.id] = c.count || 0;
      totalCardsInDeck += c.count || 0;
    });
  }
  
  document.getElementById('builderDeckName').value = name;
  switchMode('builder');
  
  if (allCards.length > 0) {
    renderCustomDeck();
  }
}

// --- Deck Builder Logic ---
let allCards = [];
let customDeckCounts = {};
let totalCardsInDeck = 0;

function switchMode(mode) {
  document.getElementById('navOpt').classList.toggle('active', mode === 'optimizer');
  document.getElementById('navBuild').classList.toggle('active', mode === 'builder');
  document.getElementById('navSaved').classList.toggle('active', mode === 'saved');
  
  document.getElementById('optimizerView').style.display = mode === 'optimizer' ? 'block' : 'none';
  document.getElementById('builderView').style.display = mode === 'builder' ? 'block' : 'none';
  document.getElementById('savedDecksPanel').style.display = mode === 'saved' ? 'block' : 'none';
  
  if (mode === 'builder' && allCards.length === 0) fetchLibrary();
}

async function fetchLibrary() {
  try {
    const res = await fetch('/api/cards');
    const data = await res.json();
    allCards = data.cards;
    renderLibrary();
    renderCustomDeck();
  } catch(e) { console.error(e); }
}

function renderLibrary() {
  const grid = document.getElementById('libraryGrid');
  const query = document.getElementById('libSearch').value.toLowerCase();
  const filter = document.getElementById('libFilter').value;
  const sort = document.getElementById('libSort').value;
  
  let filteredCards = allCards.filter(c => {
    if (query && !c.name.toLowerCase().includes(query)) return false;
    if (filter && filter !== 'all') {
      const parts = filter.split(':');
      if (parts[0] === 'super' && c.supertype !== parts[1]) return false;
      if (parts[0] === 'sub' && (!c.subtypes || !c.subtypes.includes(parts[1]))) return false;
    }
    return true;
  });

  if (sort === 'nameAsc') {
    filteredCards.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sort === 'hpDesc') {
    filteredCards.sort((a, b) => (b.hp || 0) - (a.hp || 0));
  }
  
  let html = '';
  const maxResults = 500;
  let count = 0;
  
  for (const c of filteredCards) {
    if (count > maxResults) break;
    
    const imgUrl = cardImgUrl(c);
    html += `<div class="library-card" onclick="addCardToBuilder('${c.id}')">
      <img src="${imgUrl}" loading="lazy" onerror="this.style.background='var(--card)';this.style.minHeight='100px';this.removeAttribute('src')">
    </div>`;
    count++;
  }
  
  grid.innerHTML = html || '<div style="color:var(--muted)">No cards found. Try adjusting filters!</div>';
  
  let countStr = '';
  if (query || filter !== 'all') countStr = `Showing ${count} of ${allCards.length} Cards`;
  else countStr = `${allCards.length} Cards Available`;
  
  document.getElementById('libraryCount').innerText = countStr;
}

function addCardToBuilder(id) {
  const card = allCards.find(c => c.id === id);
  if (!card) return;
  
  if (totalCardsInDeck >= 60) return alert('Deck is already full (60 cards max)!');
  
  const currentCount = customDeckCounts[id] || 0;
  const isBasicEnergy = card.supertype === 'Energy' && card.subtypes.includes('Basic');
  
  if (!isBasicEnergy && currentCount >= 4) {
    return alert('You can only have up to 4 copies of a card (except Basic Energy rules).');
  }
  
  customDeckCounts[id] = currentCount + 1;
  totalCardsInDeck++;
  renderCustomDeck();
}

function subCardFromBuilder(id) {
  if (!customDeckCounts[id]) return;
  customDeckCounts[id]--;
  if (customDeckCounts[id] === 0) delete customDeckCounts[id];
  totalCardsInDeck--;
  renderCustomDeck();
}

function renderCustomDeck() {
  const list = document.getElementById('builderDeckList');
  const countsEl = document.getElementById('builderCounts');
  
  let pCount=0, tCount=0, eCount=0;
  
  let deckArr = Object.entries(customDeckCounts).map(([id, count]) => {
    const c = allCards.find(card => card.id === id);
    if(c.supertype === 'Pokémon') pCount += count;
    else if(c.supertype === 'Trainer') tCount += count;
    else eCount += count;
    return { ...c, count };
  });
  
  deckArr.sort((a,b) => {
    const order = { 'Pokémon':1, 'Trainer':2, 'Energy':3 };
    if(order[a.supertype] !== order[b.supertype]) return order[a.supertype] - order[b.supertype];
    return a.name.localeCompare(b.name);
  });
  
  countsEl.innerHTML = `<b>${totalCardsInDeck} / 60</b> Cards &nbsp;|&nbsp; ${pCount}P / ${tCount}T / ${eCount}E`;
  
  let html = '';
  deckArr.forEach(c => {
    html += `<div class="builder-item">
      <div style="width: 20px; text-align:center; color:${c.supertype==='Pokémon'?'var(--accent)':c.supertype==='Trainer'?'var(--yellow)':'var(--green)'};" title="${c.supertype}">●</div>
      <div class="b-name" onclick="zoomCard(event, '${cardImgUrl(c)}', this)">${c.name}</div>
      <div class="b-ctrl">
        <button onclick="subCardFromBuilder('${c.id}')">-</button>
        <span class="b-count">${c.count}</span>
        <button onclick="addCardToBuilder('${c.id}')">+</button>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

async function saveCustomDeck() {
  if (totalCardsInDeck !== 60) return alert('Deck must have exactly 60 cards to be completely optimized!');
  const name = document.getElementById('builderDeckName').value.trim();
  if (!name) return alert('Please enter a name for your custom deck.');
  
  let pCount=0, tCount=0, eCount=0;
  const cardsPayload = Object.entries(customDeckCounts).map(([id, count]) => {
    const c = allCards.find(card => card.id === id);
    if(c.supertype === 'Pokémon') pCount += count;
    else if(c.supertype === 'Trainer') tCount += count;
    else eCount += count;
    return { ...c, count };
  });
  
  const payload = {
    name,
    deck: {
      fitness: null,
      total_cards: totalCardsInDeck,
      pokemon_count: pCount,
      trainer_count: tCount,
      energy_count: eCount,
      cards: cardsPayload
    }
  };
  
  try {
    await fetch('/api/saved_decks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    alert('Deck perfectly saved to your library!');
    document.getElementById('builderDeckName').value = '';
    loadSavedDecks();
    switchMode('saved');
    
    setTimeout(() => {
      const tabs = document.getElementById('savedDeckTabs').querySelectorAll('button');
      const targetTab = Array.from(tabs).find(b => b.textContent === name);
      if (targetTab) targetTab.click();
    }, 100);
  } catch (e) { alert('Failed to successfully save manual deck'); }
}

</script>
